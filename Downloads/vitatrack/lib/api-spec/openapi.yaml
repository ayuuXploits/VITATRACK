openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: vitatrack
    description: VitaTrack AI coach operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /vitatrack/ai-coach:
    post:
      operationId: vitatrackAiCoach
      tags: [vitatrack]
      summary: Get AI coach response
      description: Proxies a prompt to the AI model and returns a coaching response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCoachInput"
      responses:
        "200":
          description: AI response text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCoachResponse"
        "500":
          description: AI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AiCoachInput:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          minLength: 1
    AiCoachResponse:
      type: object
      required:
        - text
      properties:
        text:
          type: string
    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
